# nginx reverse proxy untuk Fortunas AI (HTTP, pakai IP dulu).
# Pasang di: /etc/nginx/sites-available/fortunas  → symlink ke sites-enabled/
# HTTPS nanti: tambah domain di server_name lalu jalankan certbot.

server {
    listen 80;
    server_name _;   # ganti ke domain saat migrasi HTTPS

    # Upload Excel bisa besar
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # LLM (Gemini) bisa beberapa detik — beri waktu cukup
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Streaming briefing (SSE) — matikan buffering
        proxy_buffering off;
    }
}
