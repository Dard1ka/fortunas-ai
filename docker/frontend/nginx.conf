# ============================================================
#  Fortunas AI — nginx config
#
#  - Serves React SPA (with fallback to index.html for routing)
#  - Proxies /api/* → backend:8000 (strips /api prefix)
#    This mirrors the Vite dev proxy in vite.config.js
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── API Proxy → FastAPI backend ──────────────────────────
    # Matches: /api/ask, /api/briefing, /api/health, /api/wa/simulate, etc.
    # Strips /api prefix before forwarding (same as Vite proxy rewrite)
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Streaming support (for SSE / chunked responses)
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;

        # Timeout (LLM inference can take a few seconds)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── React SPA fallback ───────────────────────────────────
    # All other routes → index.html (React Router handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ─────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin" always;
}
