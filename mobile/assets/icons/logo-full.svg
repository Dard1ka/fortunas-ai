<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Fortunas AI full lockup — brand tile + wordmark (matches design HTML thumbnail) -->
  <rect width="1200" height="800" fill="#FAF7F0"/>
  <g transform="translate(600 400)">
    <!-- offset pop shadow -->
    <rect x="-180" y="-160" width="360" height="320" rx="80" fill="#0E0E14" transform="rotate(-4) translate(28 28)"/>
    <!-- main tile -->
    <rect x="-180" y="-160" width="360" height="320" rx="80" fill="#0E0E14" transform="rotate(-4)"/>
    <!-- F letter -->
    <text x="0" y="60" font-family="Space Grotesk, system-ui, sans-serif" font-weight="700" font-size="280" fill="#D4F56A" text-anchor="middle" transform="rotate(-4)">F</text>
  </g>
  <!-- Wordmark below -->
  <text x="600" y="700" font-family="Space Grotesk, system-ui, sans-serif" font-weight="600" font-size="42" fill="#0E0E14" text-anchor="middle" letter-spacing="-1">Fortunas <tspan fill="#6D5EF7">AI</tspan></text>
</svg>
